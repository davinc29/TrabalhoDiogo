<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="assets/Capelus-icon.ico">
  </head>
  <body>
    <!-- Layout Mobile -->
    <section
      class="d-flex flex-column align-items-center vh-100 w-100 d-lg-none text-primary justify-content-center mobile"
    >
      <div class="header">
        <img class="logo" src="assets/capelus-logo.svg">
        <div class="subtitle">
          <h2>Bem-Vindo de volta!</h2>
          <p>Tudo começa por você, e pra você.</p>
        </div>
      </div>

      <div class="login-container container-md w-75">
        <form>
          <div class="d-flex flex-column gap-3">
            <div class="d-flex flex-column">
              <label for="username" class="form-label">Usuário</label>
              <input type="text" class="form-control" id="username" />
            </div>

            <div class="d-flex flex-column">
              <label for="password" class="form-label">Senha</label>
              <input type="password" class="form-control" id="password" />
            </div>

            <div class="text-center">
              <a href="#" class="text-decoration-none">Esqueceu sua senha?</a>
            </div>

            <div class="button-text-box d-flex flex-column text-center mt-5">
              <button type="submit" class="btn btn-primary rounded-pill fs-5">Entrar</button>
              <p class="">
                Não tem conta?
                <a href="cadastro.jsp" class="text-decoration-none text-primary fw-bold">
                  Cadastrar-se
                </a>
              </p>
            </div>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
